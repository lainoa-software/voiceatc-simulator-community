name: Build Constraints Manifest

on:
  push:
    branches:
      - main
    paths:
      - "**/constraints.json"
      - "tools/constraints_manifest.py"
      - "tests/test_constraints_manifest.py"
      - ".github/workflows/build-constraints-manifest.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate constraints files
        run: python tools/constraints_manifest.py --validate-only
