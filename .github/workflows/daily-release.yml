name: Daily Community Release

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate routes file
        run: python tools/routes_release_manifest.py --validate-only
      - name: Validate default routes file
        run: python tools/routes_release_manifest.py --validate-only --validate-default
      - name: Validate MVA files
        run: python tools/mva_manifest.py --validate-only
      - name: Validate runway config files
        run: python tools/runway_configs_manifest.py --validate-only
      - name: Validate sector data files
        run: python tools/sector_data_manifest.py --validate-only
      - name: Validate misc drawings files
        run: python tools/misc_drawings_manifest.py --validate-only
      - name: Validate color profile files
        run: python tools/color_profiles_manifest.py --validate-only
      - name: Validate constraints files
        run: python tools/constraints_manifest.py --validate-only
      - name: Compute release metadata
        id: meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DATE="$(date -u +%F)"
          BASE_TAG="daily-${RELEASE_DATE}"
          WEEKDAY="$(date -u +%A)"
          BASE_TITLE="Daily Community Release - ${WEEKDAY} ${RELEASE_DATE}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SOURCE_SHA="$(git rev-parse HEAD)"
          mkdir -p build/release
          export BASE_TAG BASE_TITLE
          mapfile -t RELEASE_IDENTITY < <(python - <<'PY'
          import json
          import os
          import subprocess

          def suffix_for(index: int) -> str:
              letters = "abcdefghijklmnopqrstuvwxyz"
              value = index + 1
              suffix = ""
              while value > 0:
                  value, remainder = divmod(value - 1, 26)
                  suffix = letters[remainder] + suffix
              return suffix

          base_tag = os.environ["BASE_TAG"].strip()
          base_title = os.environ["BASE_TITLE"].strip()
          is_manual = os.environ.get("GITHUB_EVENT_NAME", "").strip() == "workflow_dispatch"
          tag = base_tag
          title = base_title

          if is_manual:
              releases = json.loads(
                  subprocess.check_output(
                      ["gh", "release", "list", "--limit", "200", "--json", "tagName,name"],
                      text=True,
                  )
              )
              existing_tags = {str(item.get("tagName", "")).strip() for item in releases}
              existing_titles = {str(item.get("name", "")).strip() for item in releases}
              if tag in existing_tags or title in existing_titles:
                  candidate_index = 1
                  while True:
                      suffix = suffix_for(candidate_index)
                      candidate_tag = f"{base_tag}-{suffix}"
                      candidate_title = f"{base_title} {suffix}"
                      if candidate_tag not in existing_tags and candidate_title not in existing_titles:
                          tag = candidate_tag
                          title = candidate_title
                          break
                      candidate_index += 1

          print(tag)
          print(title)
          print("true" if is_manual else "false")
          PY
          )
          TAG="${RELEASE_IDENTITY[0]}"
          TITLE="${RELEASE_IDENTITY[1]}"
          IS_MANUAL="${RELEASE_IDENTITY[2]}"
          export IS_MANUAL
          python tools/community_release_manifest.py \
            --output-dir build/release \
            --release-tag "${TAG}" \
            --release-title "${TITLE}" \
            --published-at "${PUBLISHED_AT}" \
            --commit-sha "${SOURCE_SHA}" \
            --download-repo "${GITHUB_REPOSITORY}" > build/release/summary.json
          python - <<'PY'
          import hashlib
          import importlib.util
          import json
          import os
          from pathlib import Path

          summary = json.loads(Path("build/release/summary.json").read_text(encoding="utf-8"))
          assets = summary["assets"]

          def previous_hash(path: str) -> str:
              manifest_path = Path(path)
              if not manifest_path.exists():
                  return ""
              try:
                  payload = json.loads(manifest_path.read_text(encoding="utf-8"))
              except Exception:
                  return ""
              return str(payload.get("sha256", "")).strip()

          release_assets_changed = not (
              previous_hash(".voiceatc/routes_manifest.json") == str(assets["routes_tsv"]["sha256"]).strip()
              and previous_hash(".voiceatc/mva_manifest.json") == str(assets["mva_zip"]["sha256"]).strip()
              and previous_hash(".voiceatc/runway_configs_manifest.json") == str(assets["runway_configs_zip"]["sha256"]).strip()
              and previous_hash(".voiceatc/sector_data_manifest.json") == str(assets["sector_data_zip"]["sha256"]).strip()
              and previous_hash(".voiceatc/misc_drawings_manifest.json") == str(assets["misc_drawings_zip"]["sha256"]).strip()
              and previous_hash(".voiceatc/color_profiles_manifest.json") == str(assets["color_profiles_zip"]["sha256"]).strip()
          )

          constraints_spec = importlib.util.spec_from_file_location(
              "constraints_manifest", Path("tools/constraints_manifest.py")
          )
          if constraints_spec is None or constraints_spec.loader is None:
              raise RuntimeError("unable to load tools/constraints_manifest.py")
          constraints_module = importlib.util.module_from_spec(constraints_spec)
          constraints_spec.loader.exec_module(constraints_module)
          generated_constraints_manifest = constraints_module.build_manifest(Path("."))
          constraints_manifest_path = Path(".voiceatc/constraints_manifest.json")

          current_constraints_manifest: object = {}
          if constraints_manifest_path.exists():
              try:
                  current_constraints_manifest = json.loads(
                      constraints_manifest_path.read_text(encoding="utf-8")
                  )
              except Exception:
                  current_constraints_manifest = {}

          def canonical_hash(payload: object) -> str:
              encoded = json.dumps(payload, sort_keys=True, separators=(",", ":"), ensure_ascii=False).encode("utf-8")
              return hashlib.sha256(encoded).hexdigest()

          constraints_changed = canonical_hash(current_constraints_manifest) != canonical_hash(generated_constraints_manifest)
          changed = release_assets_changed or constraints_changed
          should_publish = release_assets_changed or os.environ.get("IS_MANUAL", "").strip() == "true"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"changed={'true' if changed else 'false'}\n")
              handle.write(f"release_assets_changed={'true' if release_assets_changed else 'false'}\n")
              handle.write(f"constraints_changed={'true' if constraints_changed else 'false'}\n")
              handle.write(f"should_publish={'true' if should_publish else 'false'}\n")
              handle.write(f"airac={summary['airac']}\n")
              handle.write(f"routes_asset_name={assets['routes_tsv']['asset_name']}\n")
              handle.write(f"mva_asset_name={assets['mva_zip']['asset_name']}\n")
              handle.write(f"runway_asset_name={assets['runway_configs_zip']['asset_name']}\n")
              handle.write(f"sector_data_asset_name={assets['sector_data_zip']['asset_name']}\n")
              handle.write(f"misc_drawings_asset_name={assets['misc_drawings_zip']['asset_name']}\n")
              handle.write(f"color_profiles_asset_name={assets['color_profiles_zip']['asset_name']}\n")
              handle.write(f"release_manifest_asset_name={assets['release_manifest']['asset_name']}\n")
              handle.write(f"routes_asset_path={assets['routes_tsv']['path']}\n")
              handle.write(f"mva_asset_path={assets['mva_zip']['path']}\n")
              handle.write(f"runway_asset_path={assets['runway_configs_zip']['path']}\n")
              handle.write(f"sector_data_asset_path={assets['sector_data_zip']['path']}\n")
              handle.write(f"misc_drawings_asset_path={assets['misc_drawings_zip']['path']}\n")
              handle.write(f"color_profiles_asset_path={assets['color_profiles_zip']['path']}\n")
              handle.write(f"release_manifest_asset_path={assets['release_manifest']['path']}\n")
          PY
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "published_at=${PUBLISHED_AT}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          echo "latest_title=Latest Daily Community Release" >> "$GITHUB_OUTPUT"
      - name: Stop when nothing changed
        if: steps.meta.outputs.should_publish != 'true'
        run: echo "No release-managed community artifacts changed."
      - name: Create or update daily release
        if: steps.meta.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          TARGET="${{ steps.meta.outputs.source_sha }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TITLE}"
            gh release upload "${TAG}" \
              "${{ steps.meta.outputs.routes_asset_path }}#${{ steps.meta.outputs.routes_asset_name }}" \
              "${{ steps.meta.outputs.mva_asset_path }}#${{ steps.meta.outputs.mva_asset_name }}" \
              "${{ steps.meta.outputs.runway_asset_path }}#${{ steps.meta.outputs.runway_asset_name }}" \
              "${{ steps.meta.outputs.sector_data_asset_path }}#${{ steps.meta.outputs.sector_data_asset_name }}" \
              "${{ steps.meta.outputs.misc_drawings_asset_path }}#${{ steps.meta.outputs.misc_drawings_asset_name }}" \
              "${{ steps.meta.outputs.color_profiles_asset_path }}#${{ steps.meta.outputs.color_profiles_asset_name }}" \
              "${{ steps.meta.outputs.release_manifest_asset_path }}#${{ steps.meta.outputs.release_manifest_asset_name }}" \
              --clobber
          else
            gh release create "${TAG}" \
              "${{ steps.meta.outputs.routes_asset_path }}#${{ steps.meta.outputs.routes_asset_name }}" \
              "${{ steps.meta.outputs.mva_asset_path }}#${{ steps.meta.outputs.mva_asset_name }}" \
              "${{ steps.meta.outputs.runway_asset_path }}#${{ steps.meta.outputs.runway_asset_name }}" \
              "${{ steps.meta.outputs.sector_data_asset_path }}#${{ steps.meta.outputs.sector_data_asset_name }}" \
              "${{ steps.meta.outputs.misc_drawings_asset_path }}#${{ steps.meta.outputs.misc_drawings_asset_name }}" \
              "${{ steps.meta.outputs.color_profiles_asset_path }}#${{ steps.meta.outputs.color_profiles_asset_name }}" \
              "${{ steps.meta.outputs.release_manifest_asset_path }}#${{ steps.meta.outputs.release_manifest_asset_name }}" \
              --target "${TARGET}" \
              --latest=false \
              --title "${TITLE}" \
              --notes "Automated daily community release."
          fi
      - name: Create or update latest release alias
        if: steps.meta.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.latest_tag }}"
          TITLE="${{ steps.meta.outputs.latest_title }}"
          TARGET="${{ steps.meta.outputs.source_sha }}"
          SOURCE_TAG="${{ steps.meta.outputs.tag }}"
          SOURCE_TITLE="${{ steps.meta.outputs.title }}"
          PUBLISHED_AT="${{ steps.meta.outputs.published_at }}"
          NOTES_FILE="$(mktemp)"
          cat > "${NOTES_FILE}" <<EOF
          Rolling alias for the most recent Daily Community Release.

          Source release: ${SOURCE_TITLE}
          Source tag: ${SOURCE_TAG}
          Published at: ${PUBLISHED_AT}
          EOF
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release delete "${TAG}" --yes --cleanup-tag
          fi
          gh release create "${TAG}" \
            "${{ steps.meta.outputs.routes_asset_path }}#${{ steps.meta.outputs.routes_asset_name }}" \
            "${{ steps.meta.outputs.mva_asset_path }}#${{ steps.meta.outputs.mva_asset_name }}" \
            "${{ steps.meta.outputs.runway_asset_path }}#${{ steps.meta.outputs.runway_asset_name }}" \
            "${{ steps.meta.outputs.sector_data_asset_path }}#${{ steps.meta.outputs.sector_data_asset_name }}" \
            "${{ steps.meta.outputs.misc_drawings_asset_path }}#${{ steps.meta.outputs.misc_drawings_asset_name }}" \
            "${{ steps.meta.outputs.color_profiles_asset_path }}#${{ steps.meta.outputs.color_profiles_asset_name }}" \
            "${{ steps.meta.outputs.release_manifest_asset_path }}#${{ steps.meta.outputs.release_manifest_asset_name }}" \
            --target "${TARGET}" \
            --title "${TITLE}" \
            --notes-file "${NOTES_FILE}" \
            --latest
      - name: Write manifests
        if: steps.meta.outputs.changed == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("build/release/summary.json").read_text(encoding="utf-8"))
          manifest_paths = {
              "routes": Path(".voiceatc/routes_manifest.json"),
              "mva": Path(".voiceatc/mva_manifest.json"),
              "runway_configs": Path(".voiceatc/runway_configs_manifest.json"),
              "sector_data": Path(".voiceatc/sector_data_manifest.json"),
              "misc_drawings": Path(".voiceatc/misc_drawings_manifest.json"),
              "color_profiles": Path(".voiceatc/color_profiles_manifest.json"),
              "release": Path(".voiceatc/release_manifest.json"),
          }

          for key, path in manifest_paths.items():
              path.parent.mkdir(parents=True, exist_ok=True)
              payload = summary["manifests"][key]
              path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          python tools/constraints_manifest.py --write
      - name: Commit manifests
        if: steps.meta.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .voiceatc/routes_manifest.json .voiceatc/mva_manifest.json .voiceatc/runway_configs_manifest.json .voiceatc/sector_data_manifest.json .voiceatc/misc_drawings_manifest.json .voiceatc/color_profiles_manifest.json .voiceatc/constraints_manifest.json .voiceatc/release_manifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .voiceatc/routes_manifest.json .voiceatc/mva_manifest.json .voiceatc/runway_configs_manifest.json .voiceatc/sector_data_manifest.json .voiceatc/misc_drawings_manifest.json .voiceatc/color_profiles_manifest.json .voiceatc/constraints_manifest.json .voiceatc/release_manifest.json
          git commit -m "chore: refresh daily community release manifests"
          git push
