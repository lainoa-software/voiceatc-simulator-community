name: Validate Content Hierarchy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run hierarchy tests
        run: python -m unittest discover -s tests -p "test_content_hierarchy.py"
      - name: Validate content hierarchy
        run: python tools/content_hierarchy.py --validate-only
